<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B2230">
<title>Segundo Cerebro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink: #1B2230;
  --ink-light: #242C3D;
  --ink-lighter: #2E3850;
  --parchment: #F3EFE6;
  --parchment-dim: #DCD6C6;
  --brass: #C9A227;
  --sage: #5C7A6E;
  --brick: #8B3A3A;
  --azure: #3F6B8C;
  --line: rgba(243,239,230,0.12);
  --line-strong: rgba(243,239,230,0.22);
  --serif: 'Fraunces', serif;
  --sans: 'Inter', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  background: var(--ink);
  color: var(--parchment);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea{ font-family: inherit; }
::selection{ background: var(--brass); color: var(--ink); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline: 2px solid var(--brass);
  outline-offset: 2px;
}

#app{
  max-width: 920px;
  margin: 0 auto;
  padding: 28px 20px 90px;
}

/* ---------- Header ---------- */
.masthead{
  display:flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 22px;
  border-bottom: 1px solid var(--line-strong);
  padding-bottom: 14px;
}
.masthead h1{
  font-family: var(--serif);
  font-weight: 600;
  font-size: 26px;
  letter-spacing: 0.2px;
  margin: 0;
}
.masthead .sub{
  font-family: var(--mono);
  font-size: 11px;
  color: var(--parchment-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.capture{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 18px;
}
.type-toggle{
  display:flex;
  gap: 6px;
  margin-bottom: 10px;
}
.type-btn{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  padding: 5px 12px;
  border-radius: 3px;
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: 0.4px;
  cursor: pointer;
  text-transform: uppercase;
}
.type-btn.active[data-type="nota"]{ background: var(--brass); color: var(--ink); border-color: var(--brass); }
.type-btn.active[data-type="tarea"]{ background: var(--sage); color: var(--ink); border-color: var(--sage); }
.type-btn.active[data-type="recordatorio"]{ background: var(--brick); color: var(--parchment); border-color: var(--brick); }
.type-btn.active[data-type="proyecto"]{ background: var(--azure); color: var(--parchment); border-color: var(--azure); }

.capture form{
  display:flex;
  gap: 8px;
}
.capture input[type="text"]{
  flex: 1;
  background: var(--ink);
  border: 1px solid var(--line-strong);
  color: var(--parchment);
  padding: 10px 12px;
  border-radius: 3px;
  font-size: 15px;
}
.capture input[type="text"]::placeholder{ color: var(--parchment-dim); opacity: 0.6; }
.capture button[type="submit"]{
  background: var(--parchment);
  color: var(--ink);
  border: none;
  padding: 10px 16px;
  border-radius: 3px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.capture button[type="submit"]:hover{ background: var(--brass); }

/* ---------- Tabs ---------- */
.tabs{
  display:flex;
  gap: 2px;
  overflow-x: auto;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.tab{
  background: transparent;
  border: none;
  color: var(--parchment-dim);
  padding: 9px 14px;
  font-size: 13px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
}
.tab.active{ color: var(--parchment); border-bottom-color: var(--brass); }

.searchwrap{
  display:flex;
  gap: 8px;
  margin-bottom: 16px;
}
.searchwrap.hidden{ display:none; }
.searchwrap input{
  flex:1;
  background: var(--ink-light);
  border: 1px solid var(--line);
  color: var(--parchment);
  padding: 8px 10px;
  border-radius: 3px;
  font-size: 13px;
}
.tagcloud{
  display:flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.tagchip{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 12px;
  cursor: pointer;
}
.tagchip.active{ background: var(--brass); color: var(--ink); border-color: var(--brass); }

/* ---------- Dashboard & KPIs ---------- */
.dashboard-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}
.dash-card {
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px;
}
.dash-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--parchment-dim);
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}
.dash-value {
  font-family: var(--serif);
  font-size: 24px;
  font-weight: 700;
}
.dash-value.alert { color: #C47676; }
.dash-value.success { color: #7BBF9A; }

/* ---------- Cards ---------- */
.stats{
  font-family: var(--mono);
  font-size: 12px;
  color: var(--parchment-dim);
  margin-bottom: 16px;
}
.section-label{
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--parchment-dim);
  margin: 22px 0 10px;
  display:flex;
  align-items:center;
  gap: 8px;
}
.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background: var(--line);
}
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}
.list{
  display:flex;
  flex-direction: column;
  gap: 10px;
}

.card{
  background: var(--parchment);
  color: var(--ink);
  border-radius: 3px;
  padding: 16px 14px 12px 20px;
  position: relative;
  box-shadow: 0 10px 22px -16px rgba(0,0,0,0.6);
  transition: box-shadow 0.15s ease;
}
.card.just-added{ box-shadow: 0 0 0 2px var(--brass), 0 10px 22px -16px rgba(0,0,0,0.6); }
.card::before{
  content:'';
  position:absolute;
  left: 6px; top: 10px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0.18;
  box-shadow: 0 22px 0 0 rgba(27,34,48,0.18);
}
.card .tabstrip{
  position:absolute;
  left:0; top:0; bottom:0;
  width: 4px;
  border-radius: 3px 0 0 3px;
}
.card.type-nota .tabstrip{ background: var(--brass); }
.card.type-tarea .tabstrip{ background: var(--sage); }
.card.type-recordatorio .tabstrip{ background: var(--brick); }
.card.type-proyecto .tabstrip{ background: var(--azure); }

.card-top{
  display:flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}
.card-stamp{
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(27,34,48,0.5);
  letter-spacing: 0.4px;
  white-space: nowrap;
  padding-top: 4px;
}
.card-title{
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--ink);
  width: 100%;
  padding: 2px 0;
}
.card-title.done{ text-decoration: line-through; opacity: 0.5; }
.card-body{
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px dashed rgba(27,34,48,0.18);
  color: rgba(27,34,48,0.85);
  font-size: 13px;
  font-family: var(--sans);
  resize: vertical;
  min-height: 36px;
  padding-top: 8px;
  margin-top: 4px;
}
.card-row{
  display:flex;
  align-items:center;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.card-tags{
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(27,34,48,0.15);
  color: rgba(27,34,48,0.6);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 0;
  flex: 1;
  min-width: 90px;
}
.card-date, .card-priority, .card-project-select{
  background: transparent;
  border: 1px solid rgba(27,34,48,0.18);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 3px;
}
.card-project-select {
  max-width: 140px;
}
.card-check{
  width: 16px; height: 16px;
  accent-color: var(--sage);
  cursor: pointer;
  flex-shrink: 0;
}
.priority-dot{
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink:0;
}
.priority-dot.baja{ background: var(--sage); }
.priority-dot.media{ background: var(--brass); }
.priority-dot.alta{ background: var(--brick); }
.card-del{
  background: none;
  border: none;
  color: rgba(27,34,48,0.35);
  cursor: pointer;
  font-size: 13px;
  margin-left: auto;
  padding: 2px 4px;
}
.card-del:hover{ color: var(--brick); }
.overdue-flag{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--brick);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.empty{
  font-family: var(--mono);
  font-size: 13px;
  color: var(--parchment-dim);
  border: 1px dashed var(--line-strong);
  border-radius: 4px;
  padding: 24px;
  text-align: center;
  line-height: 1.6;
}

/* ---------- Finanzas ---------- */
.fin-capture{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 18px;
}
.fin-row{
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.fin-type-toggle{
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.fin-type-btn{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  padding: 5px 14px;
  border-radius: 3px;
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: 0.4px;
  cursor: pointer;
  text-transform: uppercase;
}
.fin-type-btn.active[data-fintype="ingreso"]{ background: var(--sage); color: var(--ink); border-color: var(--sage); }
.fin-type-btn.active[data-fintype="gasto"]{ background: var(--brick); color: var(--parchment); border-color: var(--brick); }
.fin-input{
  background: var(--ink);
  border: 1px solid var(--line-strong);
  color: var(--parchment);
  padding: 9px 10px;
  border-radius: 3px;
  font-size: 14px;
  font-family: var(--sans);
}
.fin-input::placeholder{ color: var(--parchment-dim); opacity: 0.6; }
.fin-input-desc{ flex: 2; min-width: 140px; }
.fin-input-amount{ width: 130px; font-family: var(--mono); }
.fin-input-cat{ width: 140px; font-size: 12px; font-family: var(--mono); }
.fin-submit{
  background: var(--parchment);
  color: var(--ink);
  border: none;
  padding: 9px 16px;
  border-radius: 3px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
}
.fin-submit:hover{ background: var(--brass); }

.fin-summary{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.fin-kpi{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 16px;
}
.fin-kpi-label{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--parchment-dim);
  margin-bottom: 6px;
}
.fin-kpi-value{
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.fin-kpi-value.ingreso{ color: #7BBF9A; }
.fin-kpi-value.gasto{ color: #C47676; }
.fin-kpi-value.balance.pos{ color: #7BBF9A; }
.fin-kpi-value.balance.neg{ color: #C47676; }

.fin-list{
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.fin-item{
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 10px 12px;
}
.fin-item-dot{ width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fin-item-dot.ingreso{ background: #7BBF9A; }
.fin-item-dot.gasto{ background: #C47676; }
.fin-item-desc{ flex: 1; font-size: 14px; color: var(--parchment); }
.fin-item-amount{ font-family: var(--mono); font-size: 14px; font-weight: 500; text-align: right; }
.fin-item-amount.ingreso{ color: #7BBF9A; }
.fin-item-amount.gasto{ color: #C47676; }
.fin-item-del{ background: none; border: none; color: rgba(243,239,230,0.25); cursor: pointer; }
.fin-item-del:hover{ color: #C47676; }

/* ---------- Footer & Toast ---------- */
.footer{
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--ink-light); border-top: 1px solid var(--line);
  display:flex; align-items:center; gap: 10px; padding: 10px 16px; flex-wrap: wrap; z-index: 40;
}
.footer button, .footer .import-label{
  background: transparent; border: 1px solid var(--line-strong); color: var(--parchment-dim);
  font-family: var(--mono); font-size: 11px; padding: 6px 10px; border-radius: 3px; cursor: pointer; text-transform: uppercase;
}
.footer button:hover, .footer .import-label:hover{ color: var(--parchment); border-color: var(--parchment-dim); }
.footer-note{ font-family: var(--mono); font-size: 10px; color: var(--parchment-dim); opacity: 0.6; margin-left: auto; }

#toast{
  position: fixed; bottom: 56px; left: 50%; transform: translateX(-50%) translateY(10px);
  background: var(--brass); color: var(--ink); font-family: var(--mono); font-size: 12px;
  padding: 8px 14px; border-radius: 4px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 50;
}
#toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="app">
  <header class="masthead">
    <h1>Segundo Cerebro</h1>
    <span class="sub" id="dateToday"></span>
  </header>

  <div class="capture">
    <div class="type-toggle" id="typeToggle">
      <button type="button" class="type-btn active" data-type="nota">Nota</button>
      <button type="button" class="type-btn" data-type="tarea">Tarea</button>
      <button type="button" class="type-btn" data-type="recordatorio">Recordatorio</button>
      <button type="button" class="type-btn" data-type="proyecto">Proyecto</button>
    </div>
    <form id="captureForm">
      <input type="text" id="captureInput" placeholder="¿Qué tienes en mente? Usa #etiqueta o escribe 'mañana' para autoprocesar..." autocomplete="off">
      <button type="submit">Agregar</button>
    </form>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="dashboard">Dashboard</button>
    <button class="tab" data-view="proyectos">Proyectos</button>
    <button class="tab" data-view="notas">Notas</button>
    <button class="tab" data-view="tareas">Tareas</button>
    <button class="tab" data-view="recordatorios">Recordatorios</button>
    <button class="tab" data-view="finanzas">Finanzas</button>
  </nav>

  <div class="searchwrap hidden" id="searchwrap">
    <input type="text" id="searchInput" placeholder="Buscar por título, contenido o etiqueta…">
  </div>
  <div id="tagcloud" class="tagcloud"></div>

  <main id="content">
    <p class="muted">Cargando tu archivo…</p>
  </main>
</div>

<footer class="footer">
  <button type="button" id="exportBtn">Exportar</button>
  <label class="import-label">Importar<input type="file" id="importInput" accept="application/json" hidden></label>
  <span class="footer-note">Tus datos se guardan de manera local y en tus backups.</span>
</footer>
<div id="toast"></div>

<script>
(function(){
  "use strict";

  // Estructuras principales de datos
  var entries = [];       // Contiene Notas, Tareas, Recordatorios y PROYECTOS
  var movimientos = [];   // Finanzas habituales
  var view = 'dashboard';
  var captureType = 'nota';
  var search = '';
  var activeTag = null;

  var content = document.getElementById('content');
  var searchwrap = document.getElementById('searchwrap');
  var tagcloudEl = document.getElementById('tagcloud');
  var toastEl = document.getElementById('toast');

  // Auxiliares estructurados
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  function escapeHtml(str){ return str ? String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
  function pad2(n){ return String(n).padStart(2, '0'); }
  
  function todayStr(){
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
  }

  // ---------- PERSISTENCIA INTEGRADA ----------
  function persist(){ localStorage.setItem('sc_entries', JSON.stringify(entries)); }
  function persistFin(){ localStorage.setItem('sc_movimientos', JSON.stringify(movimientos)); }

  function loadEntries(){
    try {
      var e = localStorage.getItem('sc_entries');
      var m = localStorage.getItem('sc_movimientos');
      if(e) entries = JSON.parse(e);
      if(m) movimientos = JSON.parse(m);
    } catch(err) { showToast('Error al cargar datos locales'); }
  }

  function showToast(msg){
    toastEl.innerText = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 2500);
  }

  // ---------- CAPTURA RÁPIDA INTELIGENTE ----------
  document.getElementById('captureForm').addEventListener('submit', function(e){
    e.preventDefault();
    var inputEl = document.getElementById('captureInput');
    var rawText = inputEl.value.trim();
    if(!rawText) return;

    // Procesamiento inteligente de hashtags
    var tags = [];
    var tagRegex = /#(\w+)/g;
    var match;
    while((match = tagRegex.exec(rawText)) !== null){
      tags.push(match[1]);
    }
    var cleanText = rawText.replace(tagRegex, '').trim();

    // Detección inteligente de fecha ('mañana')
    var due = '';
    if(/\bmañana\b/i.test(cleanText)){
      var tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      due = tomorrow.getFullYear() + '-' + pad2(tomorrow.getMonth()+1) + '-' + pad2(tomorrow.getDate());
      cleanText = cleanText.replace(/\bmañana\b/i, '').trim();
    }

    // Creación de la entidad según el tipo seleccionado
    var newEntry = {
      id: uid(),
      type: captureType, // 'nota', 'tarea', 'recordatorio' o 'proyecto'
      title: cleanText,
      body: captureType === 'nota' ? 'Contenido de la nota...' : '',
      tags: tags,
      createdAt: new Date().toISOString(),
      projectId: '' // Relación con Sistema de Proyectos
    };

    if(captureType === 'tarea'){
      newEntry.done = false;
      newEntry.due = due || todayStr();
      newEntry.priority = 'media';
    } else if(captureType === 'recordatorio') {
      newEntry.at = due ? due + 'T09:00' : todayStr() + 'T09:00';
    } else if(captureType === 'proyecto') {
      newEntry.status = 'activo';
    }

    entries.unshift(newEntry);
    persist();
    inputEl.value = '';
    showToast('Agregado con captura inteligente');
    render();
  });

  // ---------- GESTIÓN DE VISTAS Y RENDERS ----------
  function render(){
    // Gestión del input de búsqueda en vistas correspondientes
    if(['notas','tareas','recordatorios','proyectos'].indexOf(view) !== -1){
      searchwrap.classList.remove('hidden');
    } else {
      searchwrap.classList.add('hidden');
    }

    if(view === 'dashboard') renderDashboard();
    else if(view === 'proyectos') renderProyectos();
    else if(view === 'notas') renderFilteredList('nota');
    else if(view === 'tareas') renderFilteredList('tarea');
    else if(view === 'recordatorios') renderFilteredList('recordatorio');
    else if(view === 'finanzas') renderFinanzas();
  }

  // Vista 1: Dashboard de Operación Superior
  function renderDashboard(){
    var hoy = todayStr();
    var tareasPendientes = entries.filter(e => e.type === 'tarea' && !e.done).length;
    var tareasVencidas = entries.filter(e => e.type === 'tarea' && !e.done && e.due < hoy).length;
    var proyectosActivos = entries.filter(e => e.type === 'proyecto' && e.status === 'activo').length;
    
    var totalGastoMes = movimientos
      .filter(m => m.type === 'gasto')
      .reduce((acc, curr) => acc + parseFloat(curr.amount || 0), 0);

    var html = `
      <div class="dashboard-grid">
        <div class="dash-card">
          <div class="dash-label">Tareas Pendientes</div>
          <div class="dash-value">${tareasPendientes}</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Tareas Vencidas</div>
          <div class="dash-value alert">${tareasVencidas}</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Proyectos Activos</div>
          <div class="dash-value success">${proyectosActivos}</div>
        </div>
        <div class="dash-card">
          <div class="dash-label">Gasto Acumulado</div>
          <div class="dash-value">$${totalGastoMes.toFixed(2)}</div>
        </div>
      </div>
      <h3 class="section-label">Acceso Directo Operativo</h3>
      <p class="muted">Usa las pestañas superiores para desglosar tus Proyectos o tus Finanzas Integradas.</p>
    `;
    content.innerHTML = html;
  }

  // Vista 2: Sistema de Proyectos Completo
  function renderProyectos(){
    var projs = entries.filter(e => e.type === 'proyecto');
    if(projs.length === 0){
      content.innerHTML = '<div class="empty">No hay proyectos creados. Usa el capturador superior seleccionando "Proyecto".</div>';
      return;
    }

    var html = '<div class="list">';
    projs.forEach(function(p){
      // Filtramos dinámicamente elementos hijos asociados a este proyecto
      var tareasHijas = entries.filter(e => e.projectId === p.id && e.type === 'tarea');
      var notasHijas = entries.filter(e => e.projectId === p.id && e.type === 'nota');
      
      html += `
        <div class="card type-proyecto" style="background: var(--parchment); color: var(--ink);">
          <div class="tabstrip"></div>
          <div class="card-top">
            <span class="card-stamp">PROYECTO • ${p.status.toUpperCase()}</span>
            <button class="card-del" onclick="window.deleteEntry('${p.id}')">✕</button>
          </div>
          <input type="text" class="card-title" value="${escapeHtml(p.title)}" onchange="window.updateTitle('${p.id}', this.value)">
          
          <div style="margin-top: 10px; font-size:12px; border-top:1px dashed rgba(0,0,0,0.15); padding-top:8px;">
            <strong>Tareas vinculadas (${tareasHijas.length}):</strong>
            ${tareasHijas.map(t => `<div style="padding:2px 0;">${t.done ? '✓' : '⬪'} ${escapeHtml(t.title)}</div>`).join('') || '<div class="muted">Ninguna tarea asignada</div>'}
          </div>

          <div style="margin-top: 8px; font-size:12px;">
            <strong>Notas vinculadas (${notasHijas.length}):</strong>
            ${notasHijas.map(n => `<div>• ${escapeHtml(n.title)}</div>`).join('') || '<div class="muted">Ninguna nota asignada</div>'}
          </div>
        </div>
      `;
    });
    html += '</div>';
    content.innerHTML = html;
  }

  // Vista 3: Listados habituales de Tareas, Notas, Recordatorios con Selector de Proyecto
  function renderFilteredList(type){
    var list = entries.filter(e => e.type === type);
    var proyectos = entries.filter(e => e.type === 'proyecto');

    if(list.length === 0){
      content.innerHTML = `<div class="empty">No hay elementos de tipo ${type}.</div>`;
      return;
    }

    var html = '<div class="grid">';
    list.forEach(function(item){
      var isDone = item.done ? 'done' : '';
      
      html += `
        <div class="card type-${type}">
          <div class="tabstrip"></div>
          <div class="card-top">
            ${type === 'tarea' ? `<input type="checkbox" class="card-check" ${item.done?'checked':''} onchange="window.toggleDone('${item.id}')">` : ''}
            <span class="card-stamp">${type.toUpperCase()}</span>
            <button class="card-del" onclick="window.deleteEntry('${item.id}')">✕</button>
          </div>
          <input type="text" class="card-title ${isDone}" value="${escapeHtml(item.title)}" onchange="window.updateTitle('${item.id}', this.value)">
          
          <div class="card-row">
            <select class="card-project-select" onchange="window.assignProject('${item.id}', this.value)">
              <option value="">-- Asignar Proyecto --</option>
              ${proyectos.map(p => `<option value="${p.id}" ${item.projectId === p.id ? 'selected' : ''}>${escapeHtml(p.title)}</option>`).join('')}
            </select>
          </div>
        </div>
      `;
    });
    html += '</div>';
    content.innerHTML = html;
  }

  // Vista 4: Módulo de Finanzas Original
  function renderFinanzas(){
    var totalIngresos = movimientos.filter(m=>m.type==='ingreso').reduce((a,c)=>a+parseFloat(c.amount||0), 0);
    var totalGastos = movimientos.filter(m=>m.type==='gasto').reduce((a,c)=>a+parseFloat(c.amount||0), 0);
    var balance = totalIngresos - totalGastos;

    var html = `
      <div class="fin-capture">
        <div class="fin-type-toggle">
          <button class="fin-type-btn ${finType==='gasto'?'active':''}" onclick="window.setFinType('gasto')">Gasto</button>
          <button class="fin-type-btn ${finType==='ingreso'?'active':''}" onclick="window.setFinType('ingreso')">Ingreso</button>
        </div>
        <div class="fin-row">
          <input type="text" id="finDesc" class="fin-input fin-input-desc" placeholder="Descripción del movimiento...">
          <input type="number" id="finAmount" class="fin-input fin-input-amount" placeholder="Monto $">
          <button class="fin-submit" onclick="window.addMovimiento()">Registrar</button>
        </div>
      </div>

      <div class="fin-summary">
        <div class="fin-kpi"><div class="fin-kpi-label">Ingresos</div><div class="fin-kpi-value ingreso">$${totalIngresos.toFixed(2)}</div></div>
        <div class="fin-kpi"><div class="fin-kpi-label">Gastos</div><div class="fin-kpi-value gasto">$${totalGastos.toFixed(2)}</div></div>
        <div class="fin-kpi"><div class="fin-kpi-label">Balance Global</div><div class="fin-kpi-value">${balance >= 0 ? '$'+balance.toFixed(2) : '-$'+Math.abs(balance).toFixed(2)}</div></div>
      </div>
    `;
    content.innerHTML = html;
  }

  // ---------- ACCIONES E INTERACCIONES EN VENTANA GLOBAL ----------
  window.updateTitle = function(id, val){
    var item = entries.find(e => e.id === id);
    if(item) { item.title = val; persist(); }
  };

  window.deleteEntry = function(id){
    entries = entries.filter(e => e.id !== id);
    persist();
    render();
  };

  window.toggleDone = function(id){
    var item = entries.find(e => e.id === id);
    if(item) { item.done = !item.done; persist(); render(); }
  };

  window.assignProject = function(entryId, projectId){
    var item = entries.find(e => e.id === entryId);
    if(item) {
      item.projectId = projectId;
      persist();
      showToast('Asignado a proyecto correctamente');
    }
  };

  window.setFinType = function(type){ finType = type; render(); };
  
  window.addMovimiento = function(){
    var desc = document.getElementById('finDesc').value.trim();
    var amount = parseFloat(document.getElementById('finAmount').value);
    if(!desc || isNaN(amount)) return;

    movimientos.unshift({
      id: uid(),
      type: finType,
      description: desc,
      amount: amount,
      date: todayStr()
    });
    persistFin();
    render();
  };

  // Gestión de clicks en capturadores superiores e inferiores
  document.getElementById('typeToggle').addEventListener('click', function(e){
    if(!e.target.classList.contains('type-btn')) return;
    Array.from(this.children).forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    captureType = e.target.getAttribute('data-type');
  });

  document.getElementById('tabs').addEventListener('click', function(e){
    if(!e.target.classList.contains('tab')) return;
    Array.from(this.children).forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    view = e.target.getAttribute('data-view');
    render();
  });

  // Exportación original en formato JSON estructurado
  document.getElementById('exportBtn').addEventListener('click', function(){
    var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({entries: entries, movimientos: movimientos}));
    var downloadAnchor = document.createElement('a');
    downloadAnchor.setAttribute("href", dataStr);
    downloadAnchor.setAttribute("download", "segundo_cerebro_upgraded.json");
    document.body.appendChild(downloadAnchor);
    downloadAnchor.click();
    downloadAnchor.remove();
  });

  // Inicialización de la App
  loadEntries();
  document.getElementById('dateToday').innerText = todayStr();
  render();

})();
</script>
</body>
</html>
