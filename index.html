<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1B2230">
<title>Segundo Cerebro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --ink: #1B2230;
  --ink-light: #242C3D;
  --ink-lighter: #2E3850;
  --parchment: #F3EFE6;
  --parchment-dim: #DCD6C6;
  --brass: #C9A227;
  --sage: #5C7A6E;
  --brick: #8B3A3A;
  --azure: #3F6B8C;
  --line: rgba(243,239,230,0.12);
  --line-strong: rgba(243,239,230,0.22);
  --serif: 'Fraunces', serif;
  --sans: 'Inter', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
}

*{ box-sizing: border-box; }
html,body{ margin:0; padding:0; }
body{
  background: var(--ink);
  color: var(--parchment);
  font-family: var(--sans);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button, input, select, textarea{ font-family: inherit; }
::selection{ background: var(--brass); color: var(--ink); }

@media (prefers-reduced-motion: reduce){
  *{ animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

a:focus-visible, button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{
  outline: 2px solid var(--brass);
  outline-offset: 2px;
}

#app{
  max-width: 920px;
  margin: 0 auto;
  padding: 28px 20px 90px;
}

/* ---------- Header ---------- */
.masthead{
  display:flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 22px;
  border-bottom: 1px solid var(--line-strong);
  padding-bottom: 14px;
}
.masthead h1{
  font-family: var(--serif);
  font-weight: 600;
  font-size: 26px;
  letter-spacing: 0.2px;
  margin: 0;
}
.masthead .sub{
  font-family: var(--mono);
  font-size: 11px;
  color: var(--parchment-dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.capture{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 12px;
  margin-bottom: 18px;
}
.type-toggle{
  display:flex;
  gap: 6px;
  margin-bottom: 10px;
}
.type-btn{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  padding: 5px 12px;
  border-radius: 3px;
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: 0.4px;
  cursor: pointer;
  text-transform: uppercase;
}
.type-btn.active[data-type="nota"]{ background: var(--brass); color: var(--ink); border-color: var(--brass); }
.type-btn.active[data-type="tarea"]{ background: var(--sage); color: var(--ink); border-color: var(--sage); }
.type-btn.active[data-type="recordatorio"]{ background: var(--brick); color: var(--parchment); border-color: var(--brick); }

.capture form{
  display:flex;
  gap: 8px;
}
.capture input[type="text"]{
  flex: 1;
  background: var(--ink);
  border: 1px solid var(--line-strong);
  color: var(--parchment);
  padding: 10px 12px;
  border-radius: 3px;
  font-size: 15px;
}
.capture input[type="text"]::placeholder{ color: var(--parchment-dim); opacity: 0.6; }
.capture button[type="submit"]{
  background: var(--parchment);
  color: var(--ink);
  border: none;
  padding: 10px 16px;
  border-radius: 3px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.3px;
}
.capture button[type="submit"]:hover{ background: var(--brass); }

/* ---------- Tabs ---------- */
.tabs{
  display:flex;
  gap: 2px;
  overflow-x: auto;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--line);
}
.tab{
  background: transparent;
  border: none;
  color: var(--parchment-dim);
  padding: 9px 14px;
  font-size: 13px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  white-space: nowrap;
  border-bottom: 2px solid transparent;
}
.tab.active{ color: var(--parchment); border-bottom-color: var(--brass); }

.searchwrap{
  display:flex;
  gap: 8px;
  margin-bottom: 16px;
}
.searchwrap.hidden{ display:none; }
.searchwrap input{
  flex:1;
  background: var(--ink-light);
  border: 1px solid var(--line);
  color: var(--parchment);
  padding: 8px 10px;
  border-radius: 3px;
  font-size: 13px;
}
.tagcloud{
  display:flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.tagchip{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 9px;
  border-radius: 12px;
  cursor: pointer;
}
.tagchip.active{ background: var(--brass); color: var(--ink); border-color: var(--brass); }

/* ---------- Cards ---------- */
.stats{
  font-family: var(--mono);
  font-size: 12px;
  color: var(--parchment-dim);
  margin-bottom: 16px;
}
.section-label{
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--parchment-dim);
  margin: 22px 0 10px;
  display:flex;
  align-items:center;
  gap: 8px;
}
.section-label::after{
  content:'';
  flex:1;
  height:1px;
  background: var(--line);
}
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}
.list{
  display:flex;
  flex-direction: column;
  gap: 10px;
}

.card{
  background: var(--parchment);
  color: var(--ink);
  border-radius: 3px;
  padding: 16px 14px 12px 20px;
  position: relative;
  box-shadow: 0 10px 22px -16px rgba(0,0,0,0.6);
  transition: box-shadow 0.15s ease;
}
.card.just-added{ box-shadow: 0 0 0 2px var(--brass), 0 10px 22px -16px rgba(0,0,0,0.6); }
.card::before{
  content:'';
  position:absolute;
  left: 6px; top: 10px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--ink);
  opacity: 0.18;
  box-shadow: 0 22px 0 0 rgba(27,34,48,0.18);
}
.card .tabstrip{
  position:absolute;
  left:0; top:0; bottom:0;
  width: 4px;
  border-radius: 3px 0 0 3px;
}
.card.type-nota .tabstrip{ background: var(--brass); }
.card.type-tarea .tabstrip{ background: var(--sage); }
.card.type-recordatorio .tabstrip{ background: var(--brick); }

.card-top{
  display:flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 6px;
}
.card-stamp{
  font-family: var(--mono);
  font-size: 10px;
  color: rgba(27,34,48,0.5);
  letter-spacing: 0.4px;
  white-space: nowrap;
  padding-top: 4px;
}
.card-title{
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  background: transparent;
  border: none;
  color: var(--ink);
  width: 100%;
  padding: 2px 0;
}
.card-title.done{ text-decoration: line-through; opacity: 0.5; }
.card-body{
  width: 100%;
  background: transparent;
  border: none;
  border-top: 1px dashed rgba(27,34,48,0.18);
  color: rgba(27,34,48,0.85);
  font-size: 13px;
  font-family: var(--sans);
  resize: vertical;
  min-height: 36px;
  padding-top: 8px;
  margin-top: 4px;
}
.card-row{
  display:flex;
  align-items:center;
  gap: 10px;
  margin-top: 8px;
  flex-wrap: wrap;
}
.card-tags{
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(27,34,48,0.15);
  color: rgba(27,34,48,0.6);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 0;
  flex: 1;
  min-width: 90px;
}
.card-date, .card-priority{
  background: transparent;
  border: 1px solid rgba(27,34,48,0.18);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 3px;
}
.card-check{
  width: 16px; height: 16px;
  accent-color: var(--sage);
  cursor: pointer;
  flex-shrink: 0;
}
.priority-dot{
  width: 7px; height: 7px;
  border-radius: 50%;
  display: inline-block;
  flex-shrink:0;
}
.priority-dot.baja{ background: var(--sage); }
.priority-dot.media{ background: var(--brass); }
.priority-dot.alta{ background: var(--brick); }
.card-del{
  background: none;
  border: none;
  color: rgba(27,34,48,0.35);
  cursor: pointer;
  font-size: 13px;
  margin-left: auto;
  padding: 2px 4px;
}
.card-del:hover{ color: var(--brick); }
.overdue-flag{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--brick);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.empty{
  font-family: var(--mono);
  font-size: 13px;
  color: var(--parchment-dim);
  border: 1px dashed var(--line-strong);
  border-radius: 4px;
  padding: 24px;
  text-align: center;
  line-height: 1.6;
}

.ai-trigger{
  display:flex;
  align-items:center;
  gap: 8px;
  background: var(--ink-light);
  border: 1px solid var(--azure);
  color: var(--parchment);
  padding: 11px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--sans);
  font-size: 13.5px;
  width: 100%;
  text-align: left;
  margin-bottom: 12px;
}
.ai-trigger:hover{ background: var(--ink-lighter); }
.ai-trigger.loading{ opacity: 0.65; cursor: default; }
.ai-trigger .icon{ font-size: 16px; }

.ai-error{
  font-family: var(--mono);
  font-size: 12px;
  color: var(--brick);
  margin-bottom: 14px;
}

.ai-result{
  background: var(--parchment);
  color: var(--ink);
  border-radius: 3px;
  padding: 16px 14px 14px 20px;
  position: relative;
  margin-bottom: 18px;
  box-shadow: 0 10px 22px -16px rgba(0,0,0,0.6);
}
.ai-result .tabstrip{
  position:absolute;
  left:0; top:0; bottom:0;
  width: 4px;
  border-radius: 3px 0 0 3px;
  background: var(--azure);
}
.ai-result-label{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: rgba(27,34,48,0.5);
  margin-bottom: 8px;
}
.ai-result-body{
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  white-space: pre-wrap;
}
.ai-result-actions{ margin-top: 10px; }
.ai-result-actions button{
  background: transparent;
  border: 1px solid rgba(27,34,48,0.25);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 3px;
  cursor: pointer;
}
.ai-result-actions button:hover{ border-color: var(--azure); color: var(--azure); }

.muted{ color: var(--parchment-dim); font-family: var(--mono); font-size: 13px; }

.collapse-toggle{
  background: none;
  border: none;
  color: var(--parchment-dim);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  text-decoration: underline;
  padding: 0;
  margin-top: 6px;
}

/* ---------- Finanzas ---------- */
.fin-capture{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px;
  margin-bottom: 18px;
}
.fin-row{
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.fin-type-toggle{
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}
.fin-type-btn{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  padding: 5px 14px;
  border-radius: 3px;
  font-size: 12px;
  font-family: var(--mono);
  letter-spacing: 0.4px;
  cursor: pointer;
  text-transform: uppercase;
}
.fin-type-btn.active[data-fintype="ingreso"]{ background: var(--sage); color: var(--ink); border-color: var(--sage); }
.fin-type-btn.active[data-fintype="gasto"]{ background: var(--brick); color: var(--parchment); border-color: var(--brick); }
.fin-input{
  background: var(--ink);
  border: 1px solid var(--line-strong);
  color: var(--parchment);
  padding: 9px 10px;
  border-radius: 3px;
  font-size: 14px;
  font-family: var(--sans);
}
.fin-input::placeholder{ color: var(--parchment-dim); opacity: 0.6; }
.fin-input-desc{ flex: 2; min-width: 140px; }
.fin-input-amount{ width: 130px; font-family: var(--mono); }
.fin-input-cat{ width: 140px; font-size: 12px; font-family: var(--mono); }
.fin-submit{
  background: var(--parchment);
  color: var(--ink);
  border: none;
  padding: 9px 16px;
  border-radius: 3px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
}
.fin-submit:hover{ background: var(--brass); }

.fin-summary{
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.fin-kpi{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 16px;
}
.fin-kpi-label{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--parchment-dim);
  margin-bottom: 6px;
}
.fin-kpi-value{
  font-family: var(--serif);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.5px;
}
.fin-kpi-value.ingreso{ color: #7BBF9A; }
.fin-kpi-value.gasto{ color: #C47676; }
.fin-kpi-value.balance.pos{ color: #7BBF9A; }
.fin-kpi-value.balance.neg{ color: #C47676; }
.fin-kpi-value.balance.zero{ color: var(--parchment-dim); }

.fin-bar-wrap{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 14px 16px;
  margin-bottom: 18px;
}
.fin-bar-label{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--parchment-dim);
  margin-bottom: 10px;
}
.fin-bar-track{
  height: 8px;
  background: rgba(243,239,230,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.fin-bar-fill{
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s ease;
}
.fin-bar-fill.ingreso{ background: #7BBF9A; }
.fin-bar-fill.gasto{ background: #C47676; }
.fin-bar-legend{
  display: flex;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--parchment-dim);
  margin-top: 6px;
}

.fin-list{
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.fin-item{
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 10px 12px;
}
.fin-item-dot{
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.fin-item-dot.ingreso{ background: #7BBF9A; }
.fin-item-dot.gasto{ background: #C47676; }
.fin-item-desc{
  flex: 1;
  font-size: 14px;
  color: var(--parchment);
  font-family: var(--sans);
}
.fin-item-cat{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--parchment-dim);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 2px 7px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
}
.fin-item-amount{
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  min-width: 90px;
  text-align: right;
}
.fin-item-amount.ingreso{ color: #7BBF9A; }
.fin-item-amount.gasto{ color: #C47676; }
.fin-item-date{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--parchment-dim);
  white-space: nowrap;
}
.fin-item-del{
  background: none;
  border: none;
  color: rgba(243,239,230,0.25);
  cursor: pointer;
  font-size: 12px;
  padding: 2px 4px;
}
.fin-item-del:hover{ color: #C47676; }

.fin-cat-breakdown{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
  margin-bottom: 18px;
}
.fin-cat-item{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 10px 12px;
}
.fin-cat-name{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--parchment-dim);
  margin-bottom: 4px;
}
.fin-cat-val{
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: #C47676;
}

.fin-filter-row{
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.fin-filter-btn{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 12px;
  border-radius: 12px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.fin-filter-btn.active{ background: var(--brass); color: var(--ink); border-color: var(--brass); }

.fin-hoy-mini{
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 12px 14px;
  margin-bottom: 18px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.fin-hoy-mini-label{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--parchment-dim);
  margin-bottom: 2px;
}
.fin-hoy-mini-val{
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
}

@media (max-width: 640px){
  .fin-summary{ grid-template-columns: 1fr 1fr; }
  .fin-summary .fin-kpi:last-child{ grid-column: span 2; }
  .fin-input-desc{ min-width: 120px; }
  .fin-input-amount{ width: 110px; }
}

/* ---------- Programados ---------- */
.fin-tabs{
  display: flex;
  gap: 2px;
  margin-bottom: 16px;
  border-bottom: 1px solid var(--line);
}
.fin-tab{
  background: transparent;
  border: none;
  color: var(--parchment-dim);
  padding: 8px 14px;
  font-size: 12px;
  font-family: var(--mono);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
}
.fin-tab.active{ color: var(--parchment); border-bottom-color: var(--brass); }

.prog-item{
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 3px;
  padding: 10px 12px;
  flex-wrap: wrap;
}
.prog-item-dot{
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.prog-item-dot.ingreso{ background: #7BBF9A; }
.prog-item-dot.gasto{ background: #C47676; }
.prog-item-desc{
  flex: 1;
  min-width: 100px;
  font-size: 14px;
  color: var(--parchment);
}
.prog-item-freq{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--parchment-dim);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  padding: 2px 8px;
  border: 1px solid var(--line-strong);
  border-radius: 10px;
}
.prog-item-next{
  font-family: var(--mono);
  font-size: 11px;
  color: var(--brass);
}
.prog-item-amount{
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  min-width: 90px;
  text-align: right;
}
.prog-item-amount.ingreso{ color: #7BBF9A; }
.prog-item-amount.gasto{ color: #C47676; }
.prog-item-del{
  background: none;
  border: none;
  color: rgba(243,239,230,0.25);
  cursor: pointer;
  font-size: 12px;
  padding: 2px 4px;
}
.prog-item-del:hover{ color: #C47676; }
.prog-badge{
  display: inline-block;
  background: var(--brick);
  color: var(--parchment);

  font-size: 13px;

  flex: 1;
}

}

/* ---------- Budget ---------- */
.budget-week-nav{
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.budget-week-label{
  font-family: var(--mono);
  font-size: 12px;

.budget-nav-btn{

.budget-spending-grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));

.budget-cat-row{

}
.budget-cat-name{
  font-family: var(--mono);
  font-size: 10px;

  letter-spacing: 0.5px;

  margin-bottom: 6px;
}
.budget-cat-amount{
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 600;
  color: #C47676;

}

  height: 3px;

.budget-ai-trigger{
  display: flex;
  align-items: center;

  background: var(--ink-lighter);

}
.budget-ai-trigger:hover{ background: var(--ink-light); }
.budget-ai-trigger.loading{ opacity: 0.65; cursor: default; }
.budget-ai-trigger .icon{ font-size: 18px; }
.budget-ai-trigger .sub{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--parchment-dim);
  display: block;
  margin-top: 2px;
}

.budget-result{
  margin-bottom: 18px;
}
.budget-block{
  background: var(--parchment);
  color: var(--ink);
  border-radius: 3px;
  padding: 18px 16px 14px 22px;

.budget-block .tabstrip{
  position: absolute;

}
.budget-block.analysis .tabstrip{ background: var(--azure); }

.budget-block-label{
  font-family: var(--mono);

}

  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
  white-space: pre-wrap;
}
.budget-block-body.budget-table{
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.8;
}
.budget-regen{
  background: transparent;
  border: 1px solid rgba(27,34,48,0.22);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 3px;
  cursor: pointer;
  margin-top: 8px;
}
.budget-regen:hover{ border-color: var(--azure); color: var(--azure); }
.budget-empty-week{
  font-family: var(--mono);
  font-size: 13px;
  color: var(--parchment-dim);
  border: 1px dashed var(--line-strong);
  border-radius: 4px;
  padding: 20px;
  text-align: center;
}
.budget-week-stats{
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  background: var(--ink-light);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 12px 16px;
  margin-bottom: 16px;
}
.budget-week-stat{
  flex: 1;
  min-width: 90px;
}
.budget-week-stat-label{
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--parchment-dim);

}

  font-family: var(--serif);

  font-weight: 600;
}

/* ---------- Footer ---------- */
.footer{
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--ink-light);
  border-top: 1px solid var(--line);
  display:flex;
  align-items:center;
  gap: 10px;
  padding: 10px 16px;
  flex-wrap: wrap;
}
.footer button, .footer .import-label{
  background: transparent;
  border: 1px solid var(--line-strong);
  color: var(--parchment-dim);
  font-family: var(--mono);
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 3px;
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.footer button:hover, .footer .import-label:hover{ color: var(--parchment); border-color: var(--parchment-dim); }
.footer-note{
  font-family: var(--mono);
  font-size: 10px;
  color: var(--parchment-dim);
  opacity: 0.6;
  margin-left: auto;
}

#toast{
  position: fixed;
  bottom: 56px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--brass);
  color: var(--ink);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 50;
}
#toast.show{
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

@media (max-width: 640px){
  .masthead{ flex-direction: column; gap: 4px; }
  .footer{ font-size: 10px; }
  .footer-note{ margin-left: 0; width: 100%; order: 10; }
}
</style>
</head>
<body>
<div id="app">
  <header class="masthead">
    <h1>Segundo Cerebro</h1>
    <span class="sub" id="dateToday"></span>
  </header>

  <div class="capture">
    <div class="type-toggle" id="typeToggle">
      <button type="button" class="type-btn active" data-type="nota">Nota</button>
      <button type="button" class="type-btn" data-type="tarea">Tarea</button>
      <button type="button" class="type-btn" data-type="recordatorio">Recordatorio</button>
    </div>
    <form id="captureForm">
      <input type="text" id="captureInput" placeholder="¿Qué tienes en mente?" autocomplete="off">
      <button type="submit">Agregar</button>
    </form>
  </div>

  <nav class="tabs" id="tabs">
    <button class="tab active" data-view="hoy">Hoy</button>
    <button class="tab" data-view="notas">Notas</button>
    <button class="tab" data-view="tareas">Tareas</button>
    <button class="tab" data-view="recordatorios">Recordatorios</button>
    <button class="tab" data-view="finanzas">Finanzas</button>
  </nav>

  <div class="searchwrap hidden" id="searchwrap">
    <input type="text" id="searchInput" placeholder="Buscar por título, contenido o etiqueta…">
  </div>
  <div id="tagcloud"></div>

  <main id="content">
    <p class="muted">Cargando tu cerebro…</p>
  </main>
</div>

<footer class="footer">
  <button type="button" id="notifBtn">🔔 Activar avisos</button>
  <button type="button" id="exportBtn">Exportar</button>
  <label class="import-label">Importar<input type="file" id="importInput" accept="application/json" hidden></label>
  <span class="footer-note">Tus datos se guardan de forma persistente.</span>
</footer>

<div id="toast"></div>

<script>
(function(){
  "use strict";

  var entries = [];
  var view = 'hoy';
  var captureType = 'nota';
  var search = '';
  var activeTag = null;
  var lastAddedId = null;
  var showCompleted = false;
  var aiAnalysis = null;
  var aiLoading = false;
  var aiError = null;
  var aiTimestamp = null;

  // --- Finanzas ---
  var movimientos = [];
  var finType = 'gasto';
  var finFilter = 'todo'; // 'todo' | 'ingreso' | 'gasto'
  var finSubview = 'movimientos'; // 'movimientos' | 'programados' | 'budget'
  var programados = []; 
  var progType = 'gasto';
  var entradasProg = []; 
  var epType = 'tarea'; 

  // Budget AI State
  var budgetResult = null; 
  var budgetLoading = false;
  var budgetError = null;
  var budgetWeekOffset = 0; 

  var content = document.getElementById('content');
  var searchwrap = document.getElementById('searchwrap');
  var tagcloudEl = document.getElementById('tagcloud');
  var toastEl = document.getElementById('toast');

  // ---------- utils ----------
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
  
  function escapeHtml(str){
    if(str === null || str === undefined) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  var MONTHS = ['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  
  function fmtDate(iso){
    if(!iso) return '';
    var d = new Date(iso + 'T00:00:00');
    if(isNaN(d.getTime())) return '';
    return pad2(d.getDate()) + '.' + MONTHS[d.getMonth()] + '.' + String(d.getFullYear()).slice(2);
  }

  function fmtDateTime(iso){
    if(!iso) return '';
    var d = new Date(iso);
    if(isNaN(d.getTime())) return '';
    return pad2(d.getDate()) + '.' + MONTHS[d.getMonth()] + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  }

  function pad2(n){ return String(n).padStart(2, '0'); }
  
  function todayStr(){
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
  }

  function nowLocalStr(){
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate()) + 'T' + pad2(d.getHours()) + ':' + pad2(d.getMinutes());
  }

  function isOverdueTask(e){
    if(e.type !== 'tarea' || e.done || !e.dueAt) return false;
    return e.dueAt < todayStr();
  }

  function isDueToday(e){
    if(e.type !== 'tarea' || !e.dueAt) return false;
    return e.dueAt === todayStr();
  }

  function isReminderToday(e){
    if(e.type !== 'recordatorio' || !e.remindAt) return false;
    return e.remindAt.slice(0,10) === todayStr();
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 2600);
  }

  // ---------- storage ----------
  async function loadEntries(){
    try{ var res = await window.storage.get('entries'); entries = (res && res.value) ? JSON.parse(res.value) : []; }catch(err){ entries = []; }
    try{ var res2 = await window.storage.get('movimientos'); movimientos = (res2 && res2.value) ? JSON.parse(res2.value) : []; }catch(err){ movimientos = []; }
    try{ var res3 = await window.storage.get('programados'); programados = (res3 && res3.value) ? JSON.parse(res3.value) : []; }catch(err){ programados = []; }
    try{ var res4 = await window.storage.get('entradasProg'); entradasProg = (res4 && res4.value) ? JSON.parse(res4.value) : []; }catch(err){ entradasProg = []; }
    
    applyProgramados();
    applyEntradasProg();
    render();
  }

  var saveTimer = null;
  function persist(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function(){ window.storage.set('entries', JSON.stringify(entries)); }, 300);
  }

  function persistFin(){ window.storage.set('movimientos', JSON.stringify(movimientos)); }
  function persistProg(){ window.storage.set('programados', JSON.stringify(programados)); }
  function persistEP(){ window.storage.set('entradasProg', JSON.stringify(entradasProg)); }

  // ---------- recurring systems ----------
  function getNextDateForFreq(baseDate, freq){
    var d = new Date(baseDate + 'T00:00:00');
    if(freq === 'diario') d.setDate(d.getDate() + 1);
    else if(freq === 'semanal') d.setDate(d.getDate() + 7);
    else if(freq === 'quincenal') d.setDate(d.getDate() + 14);
    else if(freq === 'mensual') d.setMonth(d.getMonth() + 1);
    return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
  }

  function applyProgramados(){
    var hoy = todayStr();
    var modificado = false;
    programados.forEach(function(p){
      if(!p.nextDate) p.nextDate = hoy;
      while(p.nextDate <= hoy){
        movimientos.push({
          id: uid(),
          type: p.type,
          desc: p.desc + ' (Recurrente)',
          amount: p.amount,
          cat: p.cat || 'General',
          date: p.nextDate
        });
        p.nextDate = getNextDateForFreq(p.nextDate, p.freq);
        modificado = true;
      }
    });
    if(modificado){ persistFin(); persistProg(); }
  }

  function applyEntradasProg(){
    var hoy = todayStr();
    var modificado = false;
    entradasProg.forEach(function(p){
      if(!p.nextDate) p.nextDate = hoy;
      while(p.nextDate <= hoy){
        var e = {
          id: uid(),
          type: p.type,
          title: p.title + ' (Recurrente)',
          body: p.body || '',
          tags: p.tags ? p.tags.slice() : [],
          createdAt: new Date().toISOString()
        };
        if(p.type === 'tarea'){ e.dueAt = hoy; e.priority = p.priority || 'media'; e.done = false; }
        else if(p.type === 'recordatorio'){ e.remindAt = hoy + 'T09:00'; e.dismissed = false; }
        entries.push(e);
        p.nextDate = getNextDateForFreq(p.nextDate, p.freq);
        modificado = true;
      }
    });
    if(modificado){ persist(); persistEP(); }
  }

  // ---------- processing tags and search ----------
  function parseContent(str){
    var tags = [];
    var cleaned = str.replace(/#([\wáéíóúñ🎨🛒💡💵📅🎯🏠💼🏃🌱]+)/g, function(match, tag){
      var t = tag.toLowerCase();
      if(!tags.includes(t)) tags.push(t);
      return '';
    }).replace(/\s+/g, ' ').trim();
    return { title: cleaned || 'Sin título', tags: tags };
  }

  function getAllTags(){
    var set = new Set();
    entries.forEach(function(e){ if(e.tags) e.tags.forEach(t => set.add(t)); });
    return Array.from(set).sort();
  }

  // ---------- filtering logic ----------
  function getVisibleEntries(){
    var q = search.toLowerCase().trim();
    return entries.filter(function(e){
      if(activeTag && (!e.tags || !e.tags.includes(activeTag))) return false;
      if(q){
        var matchQ = e.title.toLowerCase().includes(q) || (e.body && e.body.toLowerCase().includes(q));
        if(!matchQ) return false;
      }
      if(view === 'hoy'){
        if(e.type === 'tarea' && !e.done && (isDueToday(e) || isOverdueTask(e))) return true;
        if(e.type === 'recordatorio' && !e.dismissed && isReminderToday(e)) return true;
        return false;
      }
      if(view === 'notas') return e.type === 'nota';
      if(view === 'tareas'){
        if(e.type !== 'tarea') return false;
        return showCompleted ? e.done : !e.done;
      }
      if(view === 'recordatorios') return e.type === 'recordatorio' && !e.dismissed;
      return false;
    }).sort(function(a,b){
      if(view === 'hoy' || view === 'tareas'){
        if(isOverdueTask(a) && !isOverdueTask(b)) return -1;
        if(!isOverdueTask(a) && isOverdueTask(b)) return 1;
        var pMap = { alta: 3, media: 2, baja: 1 };
        var pA = pMap[a.priority] || 0;
        var pB = pMap[b.priority] || 0;
        if(pA !== pB) return pB - pA;
        if(a.dueAt && b.dueAt) return a.dueAt.localeCompare(b.dueAt);
      }
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
  }

  // ---------- rendering DOM engine ----------
  function render(){
    document.getElementById('dateToday').textContent = fmtDate(todayStr());
    
    if(['notas','tareas','recordatorios'].includes(view)){
      searchwrap.classList.remove('hidden');
      renderTagCloud();
    } else {
      searchwrap.classList.add('hidden');
      tagcloudEl.innerHTML = '';
    }

    if(view === 'finanzas') { renderFinanzas(); return; }

    var visible = getVisibleEntries();
    var html = '';

    if(view === 'hoy'){
      var tHoy = movimientos.filter(m => m.date === todayStr());
      var ingHoy = tHoy.filter(m => m.type==='ingreso').reduce((a,c)=>a+c.amount, 0);
      var gasHoy = tHoy.filter(m => m.type==='gasto').reduce((a,c)=>a+c.amount, 0);
      html += '<div class="fin-hoy-mini">' +
                '<div><div class="fin-hoy-mini-label">Ingresos de Hoy</div><div class="fin-hoy-mini-val" style="color:#7BBF9A">+$' + ingHoy.toFixed(2) + '</div></div>' +
                '<div><div class="fin-hoy-mini-label">Gastos de Hoy</div><div class="fin-hoy-mini-val" style="color:#C47676">-$' + gasHoy.toFixed(2) + '</div></div>' +
                '<button type="button" class="fin-filter-btn" id="goFinBtn" style="margin-left:auto; border-radius:3px; padding:6px 12px">Abrir Finanzas</button>' +
              '</div>';
      
      html += '<div class="section-label">Enfoque para el día de hoy</div>';
    }

    if(view === 'tareas'){
      html += '<div style="margin-bottom:14px; display:flex; gap:10px; align-items:center;">' +
                '<label style="font-size:12px; font-family:var(--mono); cursor:pointer; display:flex; align-items:center; gap:6px">' +
                  '<input type="checkbox" id="toggleCompleted" ' + (showCompleted?'checked':'') + ' style="accent-color:var(--brass)"> Mostrar completadas' +
                '</label>' +
              '</div>';
    }

    if(visible.length === 0){
      html += '<div class="empty">No hay elementos que coincidan con la vista actual.</div>';
    } else {
      html += (view === 'notas' || view === 'hoy') ? '<div class="grid">' : '<div class="list">';
      visible.forEach(function(e){ html += buildCardHtml(e); });
      html += '</div>';
    }

    if(view === 'hoy' && !aiAnalysis && !aiLoading){
      html += '<div style="margin-top:24px"><button type="button" class="ai-trigger" id="aiTriggerBtn"><span class="icon">✨</span> <span>Generar resumen del día con IA</span></button></div>';
    }
    if(view === 'hoy' && aiLoading){
      html += '<div style="margin-top:24px"><div class="ai-trigger loading"><span class="icon">⏳</span> <span>Analizando tus pendientes y prioridades cotidianas…</span></div></div>';
    }
    if(view === 'hoy' && aiError){
      html += '<div class="ai-error" style="margin-top:14px">Error: ' + escapeHtml(aiError) + '</div>';
    }
    if(view === 'hoy' && aiAnalysis){
      html += '<div class="ai-result" style="margin-top:24px"><div class="tabstrip"></div>' +
                '<div class="ai-result-label">Cerebro AI asistente • ' + fmtDateTime(aiTimestamp) + '</div>' +
                '<div class="ai-result-body">' + escapeHtml(aiAnalysis) + '</div>' +
                '<div class="ai-result-actions"><button type="button" id="aiClearBtn">Descartar análisis</button></div>' +
              '</div>';
    }

    content.innerHTML = html;
    bindCardEvents(visible);

    if(view === 'hoy'){
      var btn = document.getElementById('aiTriggerBtn'); if(btn) btn.addEventListener('click', runAiRoutine);
      var clr = document.getElementById('aiClearBtn'); if(clr) clr.addEventListener('click', function(){ aiAnalysis=null; render(); });
      var goFin = document.getElementById('goFinBtn'); if(goFin) goFin.addEventListener('click', function(){ view='finanzas'; updateTabs(); render(); });
    }
    if(view === 'tareas'){
      document.getElementById('toggleCompleted').addEventListener('change', function(e){ showCompleted = e.target.checked; render(); });
    }
  }

  function renderTagCloud(){
    var tags = getAllTags();
    if(tags.length === 0){ tagcloudEl.innerHTML = ''; return; }
    var html = '<button class="tagchip' + (!activeTag?' active':'') + '" data-tag="">#todos</button>';
    tags.forEach(function(t){ html += '<button class="tagchip' + (activeTag===t?' active':'') + '" data-tag="' + escapeHtml(t) + '">#' + escapeHtml(t) + '</button>'; });
    tagcloudEl.innerHTML = '<div class="tagcloud">' + html + '</div>';
    
    Array.from(tagcloudEl.querySelectorAll('.tagchip')).forEach(function(btn){
      btn.addEventListener('click', function(){
        activeTag = btn.getAttribute('data-tag') || null;
        render();
      });
    });
  }

  // ---------- financial rendering module ----------
  function renderFinanzas(){
    var html = '<div class="fin-tabs">' +

  function renderFinMovimientos(){
    var ingresos = movimientos.filter(m => m.type === 'ingreso').reduce((a,c) => a + c.amount, 0);
    var gastos = movimientos.filter(m => m.type === 'gasto').reduce((a,c) => a + c.amount, 0);
    var bal = ingresos - gastos;
    var balClass = bal > 0 ? 'pos' : (bal < 0 ? 'neg' : 'zero');
    var sign = bal > 0 ? '+' : '';

    var filtered = movimientos.filter(function(m){
      if(finFilter === 'ingreso') return m.type === 'ingreso';
      if(finFilter === 'gasto') return m.type === 'gasto';
      return true;
    }).sort((a,b) => b.date.localeCompare(a.date));

    var totalFiltered = filtered.reduce((a,c) => a + c.amount, 0);

    var cats = {};
    movimientos.filter(m => m.type==='gasto').forEach(function(m){
      cats[m.cat] = (cats[m.cat] || 0) + m.amount;
    });
    var sortedCats = Object.keys(cats).sort((a,b) => cats[b] - cats[a]);

    var trackPct = 0;
    if(ingresos > 0) trackPct = Math.min(100, (gastos / ingresos) * 100);
    else if(gastos > 0) trackPct = 100;

    var out = '<div class="fin-summary">' +
                '<div class="fin-kpi"><div class="fin-kpi-label">Total Ingresos</div><div class="fin-kpi-value ingreso">+$' + ingresos.toFixed(2) + '</div></div>' +

                '<div class="fin-kpi"><div class="fin-kpi-label">Balance Global</div><div class="fin-kpi-value balance ' + balClass + '">' + sign + '$' + bal.toFixed(2) + '</div></div>' +
              '</div>';

    out += '<div class="fin-bar-wrap">' +
             '<div class="fin-bar-label">Consumo del Ingreso: ' + trackPct.toFixed(1) + '%</div>' +

             '<div class="fin-bar-legend"><span>$0.00</span><span>Disponible: $' + Math.max(0, ingresos-gastos).toFixed(2) + '</span></div>' +
           '</div>';

    out += '<div class="fin-capture">' +
             '<div class="fin-type-toggle">' +

               '<input type="number" id="finAmount" class="fin-input fin-input-amount" placeholder="Monto ($)" step="0.01" required>' +
               '<input type="text" id="finCat" class="fin-input fin-input-cat" placeholder="Categoría (ej: Comida)" list="finDefaultCats">' +
               '<input type="date" id="finDate" class="fin-input" required>' +
               '<button type="submit" class="fin-submit">Añadir</button>' +
             '</form>' +
             '<datalist id="finDefaultCats"><option value="Comida"><option value="Transporte"><option value="Vivienda"><option value="Servicios"><option value="Ocio"><option value="Salud"><option value="Sueldo"></datalist>' +
           '</div>';

    if(sortedCats.length > 0){
      out += '<div class="section-label">Distribución de Gastos por Categoría</div><div class="fin-cat-breakdown">';
      sortedCats.forEach(function(c){
        out += '<div class="fin-cat-item"><div class="fin-cat-name">' + escapeHtml(c) + '</div><div class="fin-cat-val">$' + cats[c].toFixed(2) + '</div></div>';
      });

    out += '<div class="section-label">Historial de Flujo Monetario</div>';
    out += '<div class="fin-filter-row">' +
             '<button class="fin-filter-btn ' + (finFilter==='todo'?'active':'') + '" data-filt="todo">Todo</button>' +
             '<button class="fin-filter-btn ' + (finFilter==='ingreso'?'active':'') + '" data-filt="ingreso">Ingresos</button>' +
             '<button class="fin-filter-btn ' + (finFilter==='gasto'?'active':'') + '" data-filt="gasto">Gastos</button>' +

  function getWeekRangeStrings(offset) {
    var today = new Date();
    var currentDay = today.getDay(); 
    var distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay; 
    
    var monday = new Date(today);
    monday.setDate(today.getDate() + distanceToMonday + (offset * 7));
    
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    
    return {
      start: monday.getFullYear() + '-' + pad2(monday.getMonth()+1) + '-' + pad2(monday.getDate()),
      end: sunday.getFullYear() + '-' + pad2(sunday.getMonth()+1) + '-' + pad2(sunday.getDate())
    };
  }

  function renderFinBudget(){
    var range = getWeekRangeStrings(budgetWeekOffset);
    var weekMovs = movimientos.filter(m => m.date >= range.start && m.date <= range.end);
    var weekGastos = weekMovs.filter(m => m.type === 'gasto').reduce((a,c) => a + c.amount, 0);
    var weekIngresos = weekMovs.filter(m => m.type === 'ingreso').reduce((a,c) => a + c.amount, 0);

    var labelStr = 'Semana: ' + fmtDate(range.start) + ' al ' + fmtDate(range.end);
    if(budgetWeekOffset === 0) labelStr += ' (Actual)';

    var out = '<div class="budget-week-nav">' +
                '<button type="button" class="budget-nav-btn" id="budgetPrevWeek">◀ Anterior</button>' +
                '<div class="budget-week-label">' + labelStr + '</div>' +
                '<button type="button" class="budget-nav-btn" id="budgetNextWeek" ' + (budgetWeekOffset===0?'disabled':'') + '>Siguiente ▶</button>' +
              '</div>';

    out += '<div class="budget-week-stats">' +
             '<div class="budget-week-stat"><div class="budget-week-stat-label">Ingresos Semana</div><div class="budget-week-stat-val" style="color:#7BBF9A">+$' + weekIngresos.toFixed(2) + '</div></div>' +
             '<div class="budget-week-stat"><div class="budget-week-stat-label">Gastos Semana</div><div class="budget-week-stat-val" style="color:#C47676">-$' + weekGastos.toFixed(2) + '</div></div>' +
             '<div class="budget-week-stat"><div class="budget-week-stat-label">Balance Neto</div><div class="budget-week-stat-val">' + ((weekIngresos-weekGastos)>=0?'+':'') + '$' + (weekIngresos-weekGastos).toFixed(2) + '</div></div>' +
           '</div>';

    var cats = {};
    weekMovs.filter(m => m.type==='gasto').forEach(function(m){
      cats[m.cat] = cats[m.cat] || { total: 0, count: 0 };
      cats[m.cat].total += m.amount;
      cats[m.cat].count++;
    });
    var sortedCats = Object.keys(cats).sort((a,b) => cats[b].total - cats[a].total);

    if(sortedCats.length === 0){
      out += '<div class="budget-empty-week">No hay egresos registrados en este periodo semanal.</div>';
    } else {
      out += '<div class="section-label">Desglose por Categoría (Esta Semana)</div><div class="budget-spending-grid">';
      var maxGasto = Math.max(...Object.keys(cats).map(k => cats[k].total));
      sortedCats.forEach(function(c){
        var pct = maxGasto > 0 ? (cats[c].total / maxGasto) * 100 : 0;
        out += '<div class="budget-cat-row">' +
                 '<div class="budget-cat-name">' + escapeHtml(c) + '</div>' +
                 '<div class="budget-cat-amount">$' + cats[c].total.toFixed(2) + '</div>' +
                 '<div class="budget-cat-count">' + cats[c].count + ' trans.</div>' +
                 '<div class="budget-cat-bar"><div class="budget-cat-bar-fill" style="width:' + pct + '%"></div></div>' +
               '</div>';
      });
      out += '</div>';
    }

    if(!budgetResult && !budgetLoading){
      out += '<div style="margin-top:20px">' +
               '<button type="button" class="budget-ai-trigger" id="budgetAiBtn">' +
                 '<span class="icon">📊</span>' +
                 '<div>' +
                   '<span>Auditoría de Presupuesto y Plan de Ahorro con IA</span>' +
                   '<span class="sub">Analiza el patrón de consumo actual para trazar metas y recortes</span>' +
                 '</div>' +
               '</button>' +
             '</div>';
    }
    if(budgetLoading){
      out += '<div style="margin-top:20px"><div class="budget-ai-trigger loading"><span class="icon">⏳</span> <span>Computando matrices financieras y optimizando plan de ahorro…</span></div></div>';
    }
    if(budgetError){
      out += '<div class="ai-error" style="margin-top:14px">Error: ' + escapeHtml(budgetError) + '</div>';
    }
    if(budgetResult){
      out += '<div class="budget-result" style="margin-top:24px">' +
               '<div style="font-family:var(--mono); font-size:11px; margin-bottom:10px; color:var(--parchment-dim); display:flex; justify-content:space-between">' +
                 '<span>AUDITORÍA INTELIGENTE</span><span>' + fmtDateTime(budgetResult.timestamp) + '</span>' +
               '</div>' +
               
               '<div class="budget-block analysis"><div class="tabstrip"></div>' +
                 '<div class="budget-block-label">Análisis de Patrones de Consumo</div>' +
                 '<div class="budget-block-body">' + escapeHtml(budgetResult.analysis) + '</div>' +
               '</div>' +

               '<div class="budget-block budget-plan"><div class="tabstrip"></div>' +
                 '<div class="budget-block-label">Estructura de Presupuesto Recomendada</div>' +
                 '<div class="budget-block-body budget-table">' + escapeHtml(budgetResult.budget) + '</div>' +
               '</div>' +

               '<div class="budget-block cuts"><div class="tabstrip"></div>' +
                 '<div class="budget-block-label">Estrategia de Recorte Sugerida</div>' +
                 '<div class="budget-block-body">' + escapeHtml(budgetResult.cuts) + '</div>' +
               '</div>' +
               
               '<button type="button" class="budget-regen" id="budgetClearBtn" style="color:var(--parchment); border-color:var(--line-strong)">Cerrar Auditoría</button>' +
             '</div>';
    }

    return out;

    out += '<span class="card-stamp">' + fmtDate(e.createdAt) + '</span>';
    out += '</div>';

    out += '<textarea class="card-body" placeholder="Añadir notas o apuntes descriptivos...">' + escapeHtml(e.body || '') + '</textarea>';

    }

    out += '<button type="button" class="card-del" title="Eliminar del sistema">✕</button>';
    out += '</div>';

    out += '</div>';
    return out;

  // ---------- event bindings for core lifecycle ----------
  function bindCardEvents(renderedList){
    var els = content.querySelectorAll('.card');
    els.forEach(function(cardEl){
      var id = cardEl.getAttribute('data-id');
      var entry = entries.find(e => e.id === id);
      if(!entry) return;

      var titleInput = cardEl.querySelector('.card-title');
      titleInput.addEventListener('change', function(){
        entry.title = titleInput.value.trim() || 'Sin título';
        persist();
      });

      var bodyText = cardEl.querySelector('.card-body');
      bodyText.addEventListener('input', function(){
        entry.body = bodyText.value;
        persist();
      });

      var tagsInput = cardEl.querySelector('.card-tags');
      tagsInput.addEventListener('change', function(){
        var parsed = parseContent(tagsInput.value);
        entry.tags = parsed.tags;
        persist();
        setTimeout(render, 1000); 
      });

      var delBtn = cardEl.querySelector('.card-del');
      delBtn.addEventListener('click', function(){
        entries = entries.filter(e => e.id !== id);
        cardEl.remove();
        persist();
        if(entries.length === 0 || visibleEntriesCount() === 0) render();
      });

      if(entry.type === 'tarea'){
        var chk = cardEl.querySelector('.card-check');
        chk.addEventListener('change', function(){
          entry.done = chk.checked;
          if(entry.done) titleInput.classList.add('done');
          else titleInput.classList.remove('done');
          persist();
          setTimeout(render, 400);
        });

        var prio = cardEl.querySelector('.card-priority');
        prio.addEventListener('change', function(){
          entry.priority = prio.value;
          var dot = cardEl.querySelector('.priority-dot');
          dot.className = 'priority-dot ' + prio.value;
          persist();
        });

        var dt = cardEl.querySelector('.card-date');
        dt.addEventListener('change', function(){
          entry.dueAt = dt.value || null;
          persist();
          setTimeout(render, 1000);
        });
      }

      if(entry.type === 'recordatorio'){
        var rDt = cardEl.querySelector('.card-date');
        rDt.addEventListener('change', function(){
          entry.remindAt = rDt.value || null;
          persist();
        });
      }
    });
  }

  function visibleEntriesCount(){ return getVisibleEntries().length; }

  function bindFinEvents(){
    // sub tabs
    Array.from(content.querySelectorAll('.fin-tab')).forEach(function(btn){
      btn.addEventListener('click', function(){
        finSubview = btn.getAttribute('data-sub');
        renderFinanzas();
      });
    });

    if(finSubview === 'movimientos'){
      // toggles de tipo
      Array.from(content.querySelectorAll('.fin-type-btn')).forEach(function(b){
        b.addEventListener('click', function(){
          finType = b.getAttribute('data-fintype');
          renderFinanzas();
        });
      });
      // default input date
      var dInput = document.getElementById('finDate');
      if(dInput && !dInput.value) dInput.value = todayStr();

      // submit form
      var f = document.getElementById('finForm');
      if(f){
        f.addEventListener('submit', function(e){
          e.preventDefault();
          var desc = document.getElementById('finDesc').value.trim();
          var amount = parseFloat(document.getElementById('finAmount').value);
          var cat = document.getElementById('finCat').value.trim() || 'General';
          var date = document.getElementById('finDate').value || todayStr();

          if(!desc || isNaN(amount)) return;

          movimientos.push({ id: uid(), type: finType, desc: desc, amount: amount, cat: cat, date: date });
          persistFin();
          showToast('Movimiento registrado');
          renderFinanzas();
        });
      }

      // filtros hitorial
      Array.from(content.querySelectorAll('.fin-filter-btn')).forEach(function(b){
        b.addEventListener('click', function(){
          finFilter = b.getAttribute('data-filt');
          renderFinanzas();
        });
      });

      // borrar movimiento
      Array.from(content.querySelectorAll('.fin-item-del')).forEach(function(b){
        b.addEventListener('click', function(){
          var id = b.getAttribute('data-id');
          movimientos = movimientos.filter(m => m.id !== id);
          persistFin();
          renderFinanzas();
        });
      });
    }

    if(finSubview === 'programados'){
      // toggles fijos
      var ptG = document.getElementById('progTypeGasto');
      var ptI = document.getElementById('progTypeIngreso');
      if(ptG && ptI){
        ptG.addEventListener('click', function(){ progType='gasto'; renderFinanzas(); });
        ptI.addEventListener('click', function(){ progType='ingreso'; renderFinanzas(); });
      }
      var pInputDate = document.getElementById('progDate');
      if(pInputDate && !pInputDate.value) pInputDate.value = todayStr();

      var pForm = document.getElementById('progForm');
      if(pForm){
        pForm.addEventListener('submit', function(e){
          e.preventDefault();
          var desc = document.getElementById('progDesc').value.trim();
          var amount = parseFloat(document.getElementById('progAmount').value);
          var cat = document.getElementById('progCat').value.trim() || 'General';
          var freq = document.getElementById('progFreq').value;
          var baseDate = document.getElementById('progDate').value || todayStr();

          if(!desc || isNaN(amount)) return;
          programados.push({ id: uid(), type: progType, desc: desc, amount: amount, cat: cat, freq: freq, nextDate: baseDate });
          persistProg();
          applyProgramados();
          renderFinanzas();
        });
      }

      // toggles acciones recurrentes
      var etT = document.getElementById('epTypeTarea');
      var etR = document.getElementById('epTypeRec');
      var etN = document.getElementById('epTypeNota');
      if(etT && etR && etN){
        etT.addEventListener('click', function(){ epType='tarea'; renderFinanzas(); });
        etR.addEventListener('click', function(){ epType='recordatorio'; renderFinanzas(); });
        etN.addEventListener('click', function(){ epType='nota'; renderFinanzas(); });
      }
      var epInputDate = document.getElementById('epDate');
      if(epInputDate && !epInputDate.value) epInputDate.value = todayStr();

      var epForm = document.getElementById('epForm');
      if(epForm){
        epForm.addEventListener('submit', function(e){
          e.preventDefault();
          var fullTitle = document.getElementById('epTitle').value.trim();
          var freq = document.getElementById('epFreq').value;
          var baseDate = document.getElementById('epDate').value || todayStr();

          if(!fullTitle) return;
          var parsed = parseContent(fullTitle);
          
          entradasProg.push({
            id: uid(),
            type: epType,
            title: parsed.title,
            tags: parsed.tags,
            freq: freq,
            nextDate: baseDate,
            priority: 'media'
          });
          persistEP();
          applyEntradasProg();
          renderFinanzas();
        });
      }

      // eliminar programados
      Array.from(content.querySelectorAll('.prog-item-del')).forEach(function(b){
        b.addEventListener('click', function(){
          var id = b.getAttribute('data-id');
          programados = programados.filter(p => p.id !== id);
          persistProg();
          renderFinanzas();
        });
      });
      Array.from(content.querySelectorAll('.prog-ep-del')).forEach(function(b){
        b.addEventListener('click', function(){
          var id = b.getAttribute('data-id');
          entradasProg = entradasProg.filter(p => p.id !== id);
          persistEP();
          renderFinanzas();
        });
      });
    }

    if(finSubview === 'budget'){
      document.getElementById('budgetPrevWeek').addEventListener('click', function(){ budgetWeekOffset--; renderFinanzas(); });
      var nBtn = document.getElementById('budgetNextWeek');
      if(nBtn) nBtn.addEventListener('click', function(){ if(budgetWeekOffset < 0){ budgetWeekOffset++; renderFinanzas(); } });
      
      var bAi = document.getElementById('budgetAiBtn');
      if(bAi) bAi.addEventListener('click', runBudgetAiRoutine);

      var bClr = document.getElementById('budgetClearBtn');
      if(bClr) bClr.addEventListener('click', function(){ budgetResult = null; renderFinanzas(); });
    }
  }

  // ---------- AI processing modules ----------
  async function runAiRoutine(){
    aiLoading = true; aiError = null; render();
    
    var localTasks = entries.filter(e => e.type === 'tarea' && !e.done);
    var localReminders = entries.filter(e => e.type === 'recordatorio' && !e.dismissed);
    var localNotes = entries.filter(e => e.type === 'nota');

    var prompt = "Eres el núcleo analítico de un Segundo Cerebro. Analiza objetivamente los datos adjuntos y genera un informe estructurado, asertivo y de prosa limpia.\n" +
                 "Hoy es " + todayStr() + ".\n\n" +
                 "=== TAREAS PENDIENTES ===\n";
    if(localTasks.length===0) prompt += "Ninguna.\n";
    else localTasks.forEach(t => prompt += "- [" + (t.priority||'media') + "] " + t.title + (t.dueAt?" (Vence: "+t.dueAt+")":"") + "\n");

    prompt += "\n=== RECORDATORIOS ===\n";
    if(localReminders.length===0) prompt += "Ninguno.\n";
    else localReminders.forEach(r => prompt += "- " + r.title + " (" + (r.remindAt||'') + ")\n");

    prompt += "\n=== NOTAS RECIENTES CONSOLIDADAS ===\n";
    var recNotes = localNotes.slice(0, 7);
    if(recNotes.length===0) prompt += "Ninguna.\n";
    else recNotes.forEach(n => prompt += "• " + n.title + ": " + (n.body?n.body.slice(0,60):'') + "\n");

    prompt += "\nEscribe un resumen ejecutivo breve dividiéndolo en:\n" +
              "1. DIAGNÓSTICO DEL DÍA (Evalúa la carga de tareas críticas o vencidas).\n" +
              "2. SECUENCIA DE ACCIÓN RECOMENDADA (Orden cronológico o de impacto para ejecutar hoy).\n" +
              "3. NEXOS SUTILES (Asociaciones o reflexiones entre tus notas recientes y las tareas vigentes).\n" +
              "Usa un tono estoico, claro y sofisticado. Evita introducciones corporativas o cierres conversacionales.";

    try {
      var reply = await window.ai.ask(prompt);
      aiAnalysis = reply;
      aiTimestamp = new Date().toISOString();
    } catch(err) {
      aiError = err.message || String(err);
    } finally {
      aiLoading = false;
      render();
    }
  }

  async function runBudgetAiRoutine(){
    budgetLoading = true; budgetError = null; renderFinanzas();

    var range = getWeekRangeStrings(budgetWeekOffset);
    var weekMovs = movimientos.filter(m => m.date >= range.start && m.date <= range.end);
    var weekGastos = weekMovs.filter(m => m.type === 'gasto');
    var weekIngresos = weekMovs.filter(m => m.type === 'ingreso').reduce((a,c) => a + c.amount, 0);

    var prompt = "Actúa como un auditor de finanzas cuantitativas. Analiza el flujo de caja semanal que se te proporciona y genera un plan estructurado de optimización.\n" +
                 "Rango analizado: " + range.start + " al " + range.end + ".\n" +
                 "Ingresos totales declarados en la semana: $" + weekIngresos.toFixed(2) + ".\n\n" +
                 "=== HISTORIAL DE EGRESOS SEMANALES ===\n";
    
    if(weekGastos.length === 0) prompt += "No se registraron egresos.\n";
    else weekGastos.forEach(g => prompt += "- " + g.date + " | " + g.cat + " | " + g.desc + " : $" + g.amount.toFixed(2) + "\n");

    prompt += "\nRequisitos de salida (Divide estrictamente en estos 3 bloques usando marcas legibles):\n" +
              "[BLOQUE_1_ANALISIS]\nAnaliza de forma matemática dónde están las fugas o concentraciones anómalas de capital.\n" +
              "[BLOQUE_2_PRESUPUESTO]\nGenera una tabla de distribución ideal para la siguiente semana basada en la regla 50/30/20 o la que consideres óptima según el nivel de ingresos. Formato texto monoespaciado limpio.\n" +
              "[BLOQUE_3_RECORTES]\n3 recomendaciones quirúrgicas de reducción de gasto directo basadas explícitamente en la lista dada.\n" +
              "Mantén un tono analítico, frío y de alta competencia. No añadas introducciones o saludos.";

    try {
      var reply = await window.ai.ask(prompt);
      
      var analysis = "Análisis no disponible.";
      var budgetTable = "Tabla no disponible.";
      var cuts = "Recomendaciones no disponibles.";

      var b1 = reply.indexOf('[BLOQUE_1_ANALISIS]');
      var b2 = reply.indexOf('[BLOQUE_2_PRESUPUESTO]');
      var b3 = reply.indexOf('[BLOQUE_3_RECORTES]');

      if(b1 !== -1 && b2 !== -1){
        analysis = reply.slice(b1 + 19, b2).trim();
      }
      if(b2 !== -1 && b3 !== -1){
        budgetTable = reply.slice(b2 + 22, b3).trim();
      }
      if(b3 !== -1){
        cuts = reply.slice(b3 + 19).trim();
      }

      if(b1 === -1 && b2 === -1 && b3 === -1){
        analysis = reply; 
      }

      budgetResult = {
        analysis: analysis,
        budget: budgetTable,
        cuts: cuts,
        timestamp: new Date().toISOString()
      };
    } catch(err) {
      budgetError = err.message || String(err);
    } finally {
      budgetLoading = false;
      renderFinanzas();
    }
  }

  // ---------- top navigation and main capture events ----------
  function updateTabs(){
    Array.from(document.getElementById('tabs').children).forEach(function(btn){
      if(btn.getAttribute('data-view') === view) btn.classList.add('active');
      else btn.classList.remove('active');
    });
  }

  document.getElementById('tabs').addEventListener('click', function(e){
    var tgt = e.target;
    if(!tgt.classList.contains('tab')) return;
    view = tgt.getAttribute('data-view');
    activeTag = null;
    updateTabs();
    render();
  });

  Array.from(document.getElementById('typeToggle').children).forEach(function(btn){
    btn.addEventListener('click', function(){
      Array.from(document.getElementById('typeToggle').children).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      captureType = btn.getAttribute('data-type');
      
      var phs = { nota: '¿Qué tienes en mente? Usa #etiquetas para clasificar...', tarea: 'Nueva tarea... Pon #etiqueta o asigna prioridad abajo', recordatorio: 'Agendar recordatorio cronológico...' };
      document.getElementById('captureInput').placeholder = phs[captureType] || '';
    });
  });

  document.getElementById('captureForm').addEventListener('submit', function(e){
    e.preventDefault();
    var inp = document.getElementById('captureInput');
    var val = inp.value.trim();
    if(!val) return;

    var parsed = parseContent(val);
    var id = uid();
    
    var item = {
      id: id,
      type: captureType,
      title: parsed.title,
      body: '',
      tags: parsed.tags,
      createdAt: new Date().toISOString()
    };

    if(captureType === 'tarea'){ item.dueAt = todayStr(); item.priority = 'media'; item.done = false; }
    if(captureType === 'recordatorio'){ item.remindAt = nowLocalStr(); item.dismissed = false; }

    entries.unshift(item);
    lastAddedId = id;
    inp.value = '';
    
    persist();
    
    if(captureType === 'nota') view = 'notas';
    else if(captureType === 'tarea') view = 'tareas';
    else if(captureType === 'recordatorio') view = 'recordatorios';
    
    updateTabs();
    render();
    
    showToast('Añadido a ' + captureType);
    
    setTimeout(function(){
      lastAddedId = null;
      var el = content.querySelector('.card[data-id="'+id+'"]');
      if(el) el.classList.remove('just-added');
    }, 1500);
  });

  document.getElementById('searchInput').addEventListener('input', function(e){
    search = e.target.value;
    render();
  });

  // ---------- system reminders notification engine ----------
  var notifTimer = null;
  function checkRemindersRoutine(){
    clearTimeout(notifTimer);
    var ahora = nowLocalStr(); 
    var modificado = false;

    entries.forEach(function(e){
      if(e.type === 'recordatorio' && !e.dismissed && e.remindAt && e.remindAt <= ahora){
        triggerSystemNotification(e.title, e.body || 'Alerta de recordatorio agendado.');
        e.dismissed = true;
        modificado = true;
      }
    });

    if(modificado){ persist(); render(); }
    notifTimer = setTimeout(checkRemindersRoutine, 20000); 
  }

  function triggerSystemNotification(title, body){
    if(Notification.permission === 'granted'){
      new Notification(title, { body: body, icon: 'https://cdn-icons-png.flaticon.com/512/3114/3114810.png' });
    } else {
      showToast('🔔 RECORDATORIO: ' + title);
    }
  }

  document.getElementById('notifBtn').addEventListener('click', function(){
    if(!('Notification' in window)){ showToast('Tu navegador no soporta alertas del sistema'); return; }
    Notification.requestPermission().then(function(perm){
      if(perm === 'granted') showToast('Avisos del sistema activados correctamente');
      else showToast('Permiso de notificaciones denegado');
    });
  });

  // ---------- data import/export backup systems ----------
  document.getElementById('exportBtn').addEventListener('click', function(){
    var packet = { entries: entries, movimientos: movimientos, programados: programados, entradasProg: entradasProg };
    var blob = new Blob([JSON.stringify(packet, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'segundo-cerebro-backup-' + todayStr() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('Archivo de respaldo exportado');
  });

  document.getElementById('importInput').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var data = JSON.parse(reader.result);
        if(Array.isArray(data)){
          entries = data;
          persist();
        } else if(data && Array.isArray(data.entries)){
          entries = data.entries;
          movimientos = Array.isArray(data.movimientos) ? data.movimientos : movimientos;
          programados = Array.isArray(data.programados) ? data.programados : programados;
          entradasProg = Array.isArray(data.entradasProg) ? data.entradasProg : entradasProg;
          persist(); persistFin(); persistProg(); persistEP();
        } else {
          showToast('El archivo no posee una firma estructural válida');
          return;
        }
        applyProgramados();
        applyEntradasProg();
        render();
        showToast('Respaldo restaurado e importado con éxito');
      }catch(err){
        showToast('Error crítico: No se pudo descodificar el JSON');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ---------- init ----------
  loadEntries();
  setTimeout(checkRemindersRoutine, 2000);

})();
</script>
</body>
